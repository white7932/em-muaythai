<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>EM무에타이</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #D85A30; --red-light: #FAECE7; --red-dark: #993C1D;
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56;
    --amber: #BA7517; --amber-light: #FAEEDA; --amber-dark: #854F0B;
    --gray: #888780; --gray-light: #F1EFE8; --gray-dark: #444441;
    --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #185FA5;
    --border: rgba(0,0,0,0.10);
    --bg: #F7F5F0; --card: #FFFFFF;
    --text: #2C2C2A; --text2: #888780;
  }
  .app { background: var(--bg); min-height: 600px; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }

  /* NAV */
  .nav { background: #1A1A18; display: flex; align-items: center; padding: 0 20px; height: 56px; gap: 4px; }
  .nav-logo { color: #fff; font-size: 17px; font-weight: 800; letter-spacing: -0.5px; margin-right: 16px; display: flex; align-items: center; gap: 6px; }
  .nav-logo .em { color: var(--red); font-size: 19px; }
  .nav-logo .sub { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 400; letter-spacing: 0; }
  .nav-tab { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: none; background: none; display: flex; align-items: center; gap: 5px; }
  .nav-tab.active { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }
  .lock-icon { font-size: 11px; opacity: 0.6; }
  .nav-right { margin-left: auto; }
  .today-badge { background: var(--red); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }

  /* PAGES */
  .main { display: flex; flex: 1; }
  .page { display: none; flex: 1; flex-direction: column; }
  .page.active { display: flex; }

  /* LOCK SCREEN */
  .lock-screen { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .lock-box { background: var(--card); border-radius: 20px; border: 0.5px solid var(--border); padding: 36px 32px; width: 320px; text-align: center; }
  .lock-icon-big { font-size: 40px; margin-bottom: 12px; }
  .lock-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .lock-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--gray); transition: all 0.15s; }
  .pin-dot.filled { background: var(--red); border-color: var(--red); }
  .pin-dot.error { background: var(--red-light); border-color: var(--red); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .pin-btn { background: var(--gray-light); border: 0.5px solid var(--border); border-radius: 12px; height: 56px; font-size: 20px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.1s; }
  .pin-btn:active { transform: scale(0.93); background: #E0DED8; }
  .pin-btn.del { font-size: 14px; color: var(--text2); }
  .lock-err { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 16px; font-weight: 600; }
  .lock-hint { font-size: 11px; color: var(--text2); margin-top: 8px; }

  /* ATTEND */
  .attend-layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 16px; flex: 1; }
  .keypad-card { background: var(--card); border-radius: 16px; border: 0.5px solid var(--border); padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .keypad-title { font-size: 15px; color: var(--text2); font-weight: 500; }
  .keypad-display { background: var(--gray-light); border-radius: 12px; width: 100%; padding: 16px 20px; text-align: center; font-size: 36px; font-weight: 700; color: var(--text); letter-spacing: 12px; min-height: 72px; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: border 0.2s; }
  .keypad-display.ready { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .keypad-display.error { border-color: var(--red); background: var(--red-light); color: var(--red-dark); }
  .keypad-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; }
  .key-btn { background: var(--gray-light); border: 0.5px solid var(--border); border-radius: 12px; height: 64px; font-size: 22px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.1s; }
  .key-btn:active { transform: scale(0.94); background: #E0DED8; }
  .key-btn.del { background: var(--amber-light); color: var(--amber-dark); font-size: 14px; }
  .key-btn.confirm { background: var(--red); color: #fff; font-size: 14px; font-weight: 700; border-color: var(--red-dark); }
  .key-btn.confirm:active { background: var(--red-dark); }
  .success-pop { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--green); color: #fff; padding: 20px 32px; border-radius: 16px; font-size: 18px; font-weight: 700; text-align: center; z-index: 99; white-space: pre-line; }
  .attend-right { display: flex; flex-direction: column; gap: 12px; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--card); border-radius: 12px; border: 0.5px solid var(--border); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-val.red { color: var(--red); }
  .stat-val.green { color: var(--green); }
  .recent-card { background: var(--card); border-radius: 12px; border: 0.5px solid var(--border); padding: 16px; flex: 1; overflow: hidden; }
  .section-head { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .attend-list { display: flex; flex-direction: column; gap: 6px; max-height: 360px; overflow-y: auto; }
  .attend-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--gray-light); border-radius: 8px; cursor: pointer; }
  .attend-avatar { width: 32px; height: 32px; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .attend-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .attend-time { margin-left: auto; font-size: 12px; color: var(--text2); }
  .attend-badge { font-size: 11px; background: var(--green-light); color: var(--green-dark); padding: 2px 7px; border-radius: 5px; font-weight: 600; }

  /* MEMBERS */
  .members-page { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .members-toolbar { display: flex; gap: 10px; align-items: center; }
  .search-box { flex: 1; background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 14px; color: var(--text); outline: none; }
  .add-btn { background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .filter-tabs { display: flex; gap: 6px; }
  .filter-tab { background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .filter-tab.on { background: var(--red); color: #fff; border-color: var(--red); }
  .members-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 10px; }
  .member-card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 16px; transition: all 0.15s; }
  .member-card:hover { border-color: var(--red); }
  .member-card.unpaid { border-left: 3px solid var(--red); }
  .member-card.paid { border-left: 3px solid var(--green); }
  .mc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .mc-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .mc-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .mc-phone { font-size: 12px; color: var(--text2); }
  .mc-info { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 600; }
  .tag.green { background: var(--green-light); color: var(--green-dark); }
  .tag.red { background: var(--red-light); color: var(--red-dark); }
  .tag.amber { background: var(--amber-light); color: var(--amber-dark); }
  .tag.gray { background: var(--gray-light); color: var(--gray-dark); }
  .mc-next-pay { margin-top: 8px; font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }

  /* 결제 버튼 스타일 */
  .pay-btn-active { margin-top: 8px; width: 100%; background: var(--green-light); color: var(--green-dark); border: 0.5px solid rgba(29,158,117,0.3); border-radius: 8px; padding: 7px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .pay-btn-active:hover { background: var(--green); color: #fff; }
  .pay-btn-done { margin-top: 8px; width: 100%; background: var(--gray-light); color: var(--gray); border: 0.5px solid var(--border); border-radius: 8px; padding: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .pay-btn-done:hover { background: var(--red-light); color: var(--red-dark); }

  .admin-logout-bar { display: flex; justify-content: flex-end; padding: 8px 16px 0; }
  .logout-btn { background: none; border: 0.5px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .logout-btn:hover { background: var(--gray-light); }

  /* CALENDAR */
  .cal-layout { display: grid; grid-template-columns: 1fr 280px; gap: 16px; padding: 16px; flex: 1; }
  .cal-card { background: var(--card); border-radius: 16px; border: 0.5px solid var(--border); padding: 20px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-size: 18px; font-weight: 700; color: var(--text); }
  .cal-nav { background: var(--gray-light); border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); padding: 4px 0 8px; }
  .cal-day { min-height: 72px; border-radius: 8px; padding: 4px; position: relative; }
  .cal-day.today { background: var(--red-light); }
  .cal-day.other-month { opacity: 0.3; }
  .day-num { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .cal-day.today .day-num { color: var(--red-dark); }
  .pay-dot { font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-bottom: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pay-dot.done { background: var(--green-light); color: var(--green-dark); text-decoration: line-through; opacity: 0.7; }
  .pay-dot.todo { background: var(--red-light); color: var(--red-dark); }
  /* 결제 달력 이름 클릭 가능 스타일 */
  .pay-dot.clickable { cursor: pointer; transition: opacity 0.15s; }
  .pay-dot.clickable:hover { opacity: 0.75; font-weight: 700; }

  .adot { font-size: 9px; padding: 1px 3px; border-radius: 3px; margin-bottom: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: var(--blue-light); color: var(--blue-dark); }
  .cal-right { display: flex; flex-direction: column; gap: 12px; }
  .unpaid-card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 16px; }
  .unpaid-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
  .unpaid-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--red-light); border-radius: 8px; }
  .unpaid-name { font-size: 13px; font-weight: 600; color: var(--red-dark); flex: 1; }
  .unpaid-due { font-size: 11px; color: var(--red); }
  .quick-pay-btn { font-size: 11px; background: var(--red); color: #fff; border: none; border-radius: 5px; padding: 3px 8px; cursor: pointer; font-weight: 700; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; align-items: center; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--card); border-radius: 20px; padding: 24px; width: 380px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 4px; display: block; }
  .form-input { width: 100%; background: var(--gray-light); border: 0.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 14px; color: var(--text); outline: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .btn-cancel { flex: 1; background: var(--gray-light); border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .btn-save { flex: 2; background: var(--red); border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; }
  .empty-state { text-align: center; padding: 32px; color: var(--text2); font-size: 14px; }

  /* 결제 내역 모달 */
  .pay-history-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg); border-radius: 10px; margin-bottom: 6px; border: 0.5px solid var(--border); }
  .pay-history-item.editing { background: var(--blue-light); border-color: var(--blue); }
  .ph-date { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .ph-amount { font-size: 13px; font-weight: 700; color: var(--green-dark); }
  .ph-note { font-size: 11px; color: var(--text2); }
  .ph-edit-btn { font-size: 11px; background: var(--blue-light); color: var(--blue-dark); border: none; border-radius: 5px; padding: 3px 8px; cursor: pointer; font-weight: 600; }
  .ph-del-btn { font-size: 11px; background: var(--red-light); color: var(--red-dark); border: none; border-radius: 5px; padding: 3px 8px; cursor: pointer; font-weight: 600; }

  /* iOS 터치 최적화 */
  button, .key-btn, .pin-btn, .nav-tab, .filter-tab {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .success-pop { pointer-events: none; }
  button:active { transform: scale(0.96); }
</style>
</head>

<body>
<div class="app">
  <nav class="nav">
    <div class="nav-logo">
      <span class="em">EM</span>무에타이
    </div>
    <button class="nav-tab active" onclick="showPage('attend', event)">출석체크</button>
    <button class="nav-tab" onclick="requestAdmin('members', event)">
      수강생 관리 <span class="lock-icon" id="lock-members">🔒</span>
    </button>
    <button class="nav-tab" onclick="requestAdmin('calendar', event)">
      캘린더 <span class="lock-icon" id="lock-calendar">🔒</span>
    </button>
    <div class="nav-right">
      <div class="today-badge" id="today-badge"></div>
    </div>
  </nav>

  <!-- ATTEND PAGE -->
  <div class="page active" id="page-attend">
    <div class="attend-layout" style="position:relative;">
      <div class="keypad-card">
        <div class="keypad-title">회원님의 등록번호를 입력하세요</div>
        <div class="keypad-display" id="kp-display">_ _ _ _</div>
        <div style="font-size:13px;color:var(--text2)" id="kp-hint">번호를 입력하세요</div>
        <div class="keypad-grid">
          <button class="key-btn" onclick="keyPress('1')">1</button>
          <button class="key-btn" onclick="keyPress('2')">2</button>
          <button class="key-btn" onclick="keyPress('3')">3</button>
          <button class="key-btn" onclick="keyPress('4')">4</button>
          <button class="key-btn" onclick="keyPress('5')">5</button>
          <button class="key-btn" onclick="keyPress('6')">6</button>
          <button class="key-btn" onclick="keyPress('7')">7</button>
          <button class="key-btn" onclick="keyPress('8')">8</button>
          <button class="key-btn" onclick="keyPress('9')">9</button>
          <button class="key-btn del" onclick="keyDelete()">← 지우기</button>
          <button class="key-btn" onclick="keyPress('0')">0</button>
          <button class="key-btn confirm" onclick="keyConfirm()">✓ 확인</button>
        </div>
      </div>
      <div class="attend-right">
        <div class="stat-row">
          <div class="stat-card"><div class="stat-label">오늘 출석</div><div class="stat-val green" id="stat-today">0</div></div>
          <div class="stat-card"><div class="stat-label">전체 수강생</div><div class="stat-val" id="stat-total">0</div></div>
          <div class="stat-card"><div class="stat-label">미결제</div><div class="stat-val red" id="stat-unpaid">0</div></div>
          <div class="stat-card"><div class="stat-label">이번달 출석</div><div class="stat-val" id="stat-month">0</div></div>
        </div>
        <div class="recent-card">
          <div class="section-head">오늘 출석 내역</div>
          <div class="attend-list" id="attend-list"><div class="empty-state">아직 출석 기록이 없습니다</div></div>
        </div>
      </div>
      <div class="success-pop" id="success-pop"></div>
    </div>
  </div>

  <!-- MEMBERS PAGE -->
  <div class="page" id="page-members">
    <div id="members-lock-screen" class="lock-screen"></div>
    <div id="members-content" style="display:none; flex-direction:column; flex:1;">
      <div class="admin-logout-bar">
        <button class="logout-btn" onclick="adminLogout('members')">🔒 잠금</button>
      </div>
      <div class="members-page">
        <div class="members-toolbar">
          <input class="search-box" placeholder="이름 또는 전화번호로 검색..." id="search-box" oninput="renderMembers()" />
          <div class="filter-tabs">
            <div class="filter-tab on" onclick="setFilter('all',this)">전체</div>
            <div class="filter-tab" onclick="setFilter('unpaid',this)">미결제</div>
            <div class="filter-tab" onclick="setFilter('paid',this)">결제완료</div>
          </div>
          <button class="add-btn" onclick="openAddMember()">+ 수강생 추가</button>
        </div>
        <div class="members-grid" id="members-grid"></div>
      </div>
    </div>
  </div>

  <!-- CALENDAR PAGE -->
  <div class="page" id="page-calendar">
    <div id="calendar-lock-screen" class="lock-screen"></div>
    <div id="calendar-content" style="display:none; flex-direction:column; flex:1;">
      <div class="admin-logout-bar">
        <button class="logout-btn" onclick="adminLogout('calendar')">🔒 잠금</button>
      </div>
      <div style="padding:16px; display:flex; flex-direction:column; gap:12px;">
        <!-- 출석/결제 토글 -->
        <div style="display:flex; gap:8px; background:#fff; border-radius:12px; padding:5px; border:0.5px solid var(--border); align-self:flex-start;">
          <button id="tog-att" onclick="switchCal('att')"
            style="padding:7px 20px; border-radius:8px; font-size:13px; font-weight:600; border:none; cursor:pointer; background:var(--red); color:#fff;">
            📋 출석
          </button>
          <button id="tog-pay" onclick="switchCal('pay')"
            style="padding:7px 20px; border-radius:8px; font-size:13px; font-weight:600; border:none; cursor:pointer; color:var(--text2); background:none;">
            💳 결제
          </button>
        </div>

        <!-- 달력 -->
        <div class="cal-card">
          <div class="cal-header">
            <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
            <div class="cal-month" id="cal-month-label"></div>
            <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>

        <!-- 하단 추가 정보 -->
        <div id="cal-extra"></div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT MEMBER MODAL -->
  <div class="modal-bg" id="modal-add">
    <div class="modal">
      <h3 id="modal-add-title">수강생 추가</h3>
      <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="f-name" placeholder="홍길동" /></div>
      <div class="form-group"><label class="form-label">전화번호 4자리</label><input class="form-input" id="f-phone" placeholder="1234" maxlength="4" type="tel" /></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">수강료 (원)</label><input class="form-input" id="f-fee" placeholder="120000" type="number" /></div>
        <div class="form-group"><label class="form-label">결제 주기</label>
          <select class="form-input" id="f-cycle">
            <option value="30">월 (30일)</option>
            <option value="90">분기 (3개월)</option>

          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">다음 결제일</label><input class="form-input" id="f-nextpay" type="date" /></div>
      <div class="form-group"><label class="form-label">수강 종류</label>
        <select class="form-input" id="f-class">
          <option value="무에타이">무에타이</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">수강 등록일(가입일)</label>
        <input class="form-input" id="f-joindate" type="date" />

  <!-- 결제 내역 모달 -->
  <div class="modal-bg" id="modal-pay-history">
    <div class="modal" style="width:460px;">
      <h3 id="ph-title">결제 내역</h3>

      <!-- 새 결제 내역 추가 폼 -->
      <div style="background:var(--green-light); border-radius:12px; padding:14px; margin-bottom:16px; border:0.5px solid rgba(29,158,117,0.3);">
        <div style="font-size:12px; font-weight:700; color:var(--green-dark); margin-bottom:10px;">+ 결제 내역 추가</div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">결제일</label>
            <input class="form-input" id="ph-new-date" type="date" />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">금액 (원)</label>
            <input class="form-input" id="ph-new-amount" type="number" placeholder="150000" />
          </div>
        </div>
        <div class="form-group" style="margin-top:8px; margin-bottom:0">
          <label class="form-label">메모 (선택)</label>
          <input class="form-input" id="ph-new-note" placeholder="예: 1개월 수강료, 연장 등" />
        </div>
        <button onclick="addPayHistory()" style="margin-top:10px; width:100%; background:var(--green); color:#fff; border:none; border-radius:8px; padding:9px; font-size:13px; font-weight:700; cursor:pointer;">
          ✓ 추가하기
        </button>
      </div>

      <!-- 기존 결제 내역 목록 -->
      <div style="font-size:12px; font-weight:700; color:var(--text2); margin-bottom:8px;">📋 결제 내역 목록</div>
      <div id="ph-list" style="max-height:300px; overflow-y:auto;">
        <div class="empty-state">결제 내역이 없습니다</div>
      </div>

      <!-- 인라인 수정 폼 (숨김) -->
      <div id="ph-edit-form" style="display:none; background:var(--blue-light); border-radius:12px; padding:14px; margin-top:12px; border:0.5px solid rgba(55,138,221,0.3);">
        <div style="font-size:12px; font-weight:700; color:var(--blue-dark); margin-bottom:10px;">✏️ 결제 내역 수정</div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">결제일</label>
            <input class="form-input" id="ph-edit-date" type="date" />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">금액 (원)</label>
            <input class="form-input" id="ph-edit-amount" type="number" />
          </div>
        </div>
        <div class="form-group" style="margin-top:8px; margin-bottom:0">
          <label class="form-label">메모</label>
          <input class="form-input" id="ph-edit-note" />
        </div>
        <div style="display:flex; gap:8px; margin-top:10px;">
          <button onclick="cancelEditPH()" style="flex:1; background:var(--gray-light); border:none; border-radius:8px; padding:8px; font-size:13px; font-weight:600; color:var(--text2); cursor:pointer;">취소</button>
          <button onclick="saveEditPH()" style="flex:2; background:var(--blue); border:none; border-radius:8px; padding:8px; font-size:13px; font-weight:700; color:#fff; cursor:pointer;">저장</button>
        </div>
      </div>

      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('modal-pay-history')">닫기</button>
      </div>
    </div>
  </div>

</div><!-- .app -->

<script>
// ────────────────────────────────────────────────
// DATA & STORAGE
// ────────────────────────────────────────────────
const STORAGE_KEY = 'emmuaythai_data';

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const data = JSON.parse(saved);
    members = data.members || members;
    todayAttendance = data.todayAttendance || [];
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ members, todayAttendance }));
}

const ADMIN_PIN = '1234';
const adminUnlocked = { members: false, calendar: false };
const pinInputs = {};
let editTargetId = null;
let currentPayHistoryMemberId = null; // 결제내역 모달에서 사용 중인 수강생 ID
let editingPHIdx = null; // 수정 중인 결제내역 인덱스

const today = new Date();
const todayStr = today.toISOString().slice(0,10);
const DOW = ['일','월','화','수','목','금','토'];
const MONTH_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let members = [
  {
    id: 1, name: '김민준', phone: '2847', fee: 120000, cycle: 30,
    nextPay: '2026-05-10', paid: false, classType: '무에타이',
    joinDate: '2025-03-01', attendance: [],
    payHistory: [] // 결제 내역 배열
  },
];
let todayAttendance = [];
let currentFilter = 'all';
let calYear = today.getFullYear();
let calMonth = today.getMonth() + 1;
let calMode = 'att';

document.getElementById('today-badge').textContent =
  `${today.getMonth()+1}월 ${today.getDate()}일 (${DOW[today.getDay()]})`;

// ────────────────────────────────────────────────
// 결제 버튼 조건 판단
// 이번 달 = 다음 결제일의 연-월이 오늘과 같은 달
// ────────────────────────────────────────────────
function isPayableThisMonth(member) {
  const np = member.nextPay; // "YYYY-MM-DD"
  const npYM = np.slice(0, 7);   // "YYYY-MM"
  const todayYM = todayStr.slice(0, 7);
  return npYM === todayYM;
}

// ────────────────────────────────────────────────
// LOCK SCREEN
// ────────────────────────────────────────────────
function buildLockScreen(targetId) {
  const el = document.getElementById(targetId + '-lock-screen');
  el.innerHTML = `
    <div class="lock-box">
      <div class="lock-icon-big">🔐</div>
      <div class="lock-title">관리자 인증</div>
      <div class="lock-sub">4자리 비밀번호를 입력해주세요</div>
      <div class="pin-dots" id="dots-${targetId}">
        ${[0,1,2,3].map(i=>`<div class="pin-dot" id="dot-${targetId}-${i}"></div>`).join('')}
      </div>
      <div class="pin-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-btn" onclick="pinPress('${targetId}','${n}')">${n}</button>`).join('')}
        <button class="pin-btn del" onclick="pinDel('${targetId}')">← 삭제</button>
        <button class="pin-btn" onclick="pinPress('${targetId}','0')">0</button>
        <button class="pin-btn" style="background:var(--red);color:#fff;font-size:13px;font-weight:700;" onclick="pinConfirm('${targetId}')">확인</button>
      </div>
      <div class="lock-err" id="err-${targetId}"></div>
      <div class="lock-hint">기본 비밀번호: 1234</div>
    </div>`;
  el.style.display = 'flex';
}

function pinPress(target, n) {
  if (!pinInputs[target]) pinInputs[target] = '';
  if (pinInputs[target].length >= 4) return;
  pinInputs[target] += n;
  updateDots(target);
  if (pinInputs[target].length === 4) pinConfirm(target);
}
function pinDel(target) {
  if (!pinInputs[target]) return;
  pinInputs[target] = pinInputs[target].slice(0,-1);
  updateDots(target);
}
function updateDots(target) {
  const len = (pinInputs[target]||'').length;
  for (let i=0;i<4;i++) {
    const d = document.getElementById(`dot-${target}-${i}`);
    if (d) { d.classList.toggle('filled', i<len); d.classList.remove('error'); }
  }
}
function pinConfirm(target) {
  const val = pinInputs[target] || '';
  if (val.length < 4) return;
  if (val === ADMIN_PIN) {
    adminUnlocked[target] = true;
    pinInputs[target] = '';
    showAdminContent(target);
    updateLockIcons();
  } else {
    pinInputs[target] = '';
    updateDots(target);
    for (let i=0;i<4;i++) {
      const d = document.getElementById(`dot-${target}-${i}`);
      if (d) d.classList.add('error');
    }
    const err = document.getElementById(`err-${target}`);
    if (err) err.textContent = '비밀번호가 틀렸습니다. 다시 입력해주세요.';
    setTimeout(() => { updateDots(target); if (err) err.textContent=''; }, 1200);
  }
}
function showAdminContent(target) {
  document.getElementById(target+'-lock-screen').style.display = 'none';
  const content = document.getElementById(target+'-content');
  content.style.display = 'flex';
  if (target === 'members') renderMembers();
  if (target === 'calendar') { renderCalendar(); renderExtra(); }
}
function adminLogout(target) {
  adminUnlocked[target] = false;
  pinInputs[target] = '';
  document.getElementById(target+'-content').style.display = 'none';
  buildLockScreen(target);
  updateLockIcons();
}
function updateLockIcons() {
  document.getElementById('lock-members').textContent = adminUnlocked.members ? '🔓' : '🔒';
  document.getElementById('lock-calendar').textContent = adminUnlocked.calendar ? '🔓' : '🔒';
}

// ────────────────────────────────────────────────
// PAGE NAV
// ────────────────────────────────────────────────
function showPage(id, e) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if (e) e.target.closest('.nav-tab').classList.add('active');
}
function requestAdmin(target, e) {
  showPage(target, e);
  if (adminUnlocked[target]) {
    showAdminContent(target);
  } else {
    document.getElementById(target+'-content').style.display = 'none';
    buildLockScreen(target);
  }
}

// ────────────────────────────────────────────────
// KEYPAD (출석체크)
// ────────────────────────────────────────────────
let kpInput = '';
function updateDisplay() {
  const disp = document.getElementById('kp-display');
  const hint = document.getElementById('kp-hint');
  disp.textContent = kpInput.padEnd(4,'_').split('').join(' ');
  disp.classList.remove('ready','error');
  if (kpInput.length === 4) {
    const m = members.find(mb => mb.phone === kpInput);
    if (m) { disp.classList.add('ready'); hint.textContent = `✓ ${m.name} 님 확인됨`; }
    else { disp.classList.add('error'); hint.textContent = '등록된 수강생이 없습니다'; }
  } else {
    hint.textContent = `${4 - kpInput.length}자리 더 입력하세요`;
  }
}
function keyPress(n) { if (kpInput.length<4) { kpInput+=n; updateDisplay(); } }
function keyDelete() { kpInput=kpInput.slice(0,-1); updateDisplay(); }
function keyConfirm() {
  if (kpInput.length!==4) return;
  const m = members.find(mb=>mb.phone===kpInput);
  if (!m) { kpInput=''; updateDisplay(); return; }
  const already = todayAttendance.find(a=>a.id===m.id&&a.date===todayStr);
  if (already) { showPop(`${m.name} 님은 이미\n출석 처리 되었습니다`,'amber'); kpInput=''; updateDisplay(); return; }
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  todayAttendance.push({ id:m.id, name:m.name, date:todayStr, time:timeStr });
  if (!m.attendance) m.attendance = [];
  m.attendance.push({ date:todayStr, time:timeStr });
  saveData();
  showPop(`${m.name} 님\n출석 완료! ✓`,'green');
  kpInput=''; updateDisplay();
  renderAttendList(); updateStats();
}
function showPop(msg, type) {
  const p = document.getElementById('success-pop');
  p.textContent=msg; p.style.display='block';
  p.style.background = type==='green'?'var(--green)':type==='amber'?'var(--amber)':'var(--red)';
  setTimeout(()=>p.style.display='none', 2000);
}
function renderAttendList() {
  const el = document.getElementById('attend-list');
  const recs = todayAttendance.filter(a=>a.date===todayStr).slice().reverse();
  if (!recs.length) { el.innerHTML='<div class="empty-state">아직 출석 기록이 없습니다</div>'; return; }
  el.innerHTML = recs.map(a => {
    const idx = members.findIndex(mb=>mb.id===a.id)%3;
    const styles = [
      'background:var(--red-light);color:var(--red-dark)',
      'background:var(--green-light);color:var(--green-dark)',
      'background:var(--blue-light);color:var(--blue-dark)'
    ];
    return `<div class="attend-item" onclick="openAttendanceDetail(${a.id})">
      <div class="attend-avatar" style="${styles[idx]}">${a.name[0]}</div>
      <div><div class="attend-name">${a.name}</div></div>
      <div class="attend-time">${a.time}</div>
      <span class="attend-badge">출석</span>
    </div>`;
  }).join('');
}
function openAttendanceDetail(memberId) {
  requestAdmin('calendar');
  switchCal('att');
}
function updateStats() {
  document.getElementById('stat-today').textContent = todayAttendance.filter(a=>a.date===todayStr).length;
  document.getElementById('stat-total').textContent = members.length;
  document.getElementById('stat-unpaid').textContent = members.filter(m=>!m.paid).length;
  const tm = todayStr.slice(0,7);
  let cnt = 0;
  members.forEach(m => { if (m.attendance) cnt += m.attendance.filter(a=>a.date.startsWith(tm)).length; });
  document.getElementById('stat-month').textContent = cnt;
}

// ────────────────────────────────────────────────
// MEMBERS
// ────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on'); renderMembers();
}

function renderMembers() {
  const q = document.getElementById('search-box').value.toLowerCase();
  let list = members;
  if (currentFilter==='unpaid') list=list.filter(m=>!m.paid);
  if (currentFilter==='paid')   list=list.filter(m=>m.paid);
  if (q) list=list.filter(m=>m.name.includes(q)||m.phone.includes(q));
  const grid = document.getElementById('members-grid');
  if (!list.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1">검색 결과가 없습니다</div>'; return; }

  grid.innerHTML = list.map(m => {
    // ★ 결제 버튼 조건 분기
    const canPayNow = isPayableThisMonth(m);
    let payBtnHtml = '';
    if (m.paid) {
      // 결제 완료 상태 → 취소 버튼 (연한 회색)
      payBtnHtml = `<button class="pay-btn-done" onclick="togglePay(${m.id})">✓ 결제완료 (취소하려면 클릭)</button>`;
    } else if (canPayNow) {
      // 미결제 & 이번달 결제일 → 활성화된 결제 처리 버튼
      payBtnHtml = `<button class="pay-btn-active" onclick="togglePay(${m.id})">💳 결제 처리</button>`;
    } else {
      // 미결제 & 결제일이 이번달 아님 → 비활성 안내 버튼
      payBtnHtml = `<button class="pay-btn-done" style="opacity:0.5; cursor:default;" disabled>🗓 ${m.nextPay} 결제 예정</button>`;
    }

    return `
    <div class="member-card ${m.paid?'paid':'unpaid'}">
      <div class="mc-top">
        <div class="mc-avatar" style="background:var(--red-light);color:var(--red-dark)">${m.name[0]}</div>
        <div>
          <div class="mc-name">${m.name}</div>
          <div class="mc-phone">${m.phone}</div>
        </div>
        <div style="margin-left:auto; display:flex; gap:5px;">
          <button onclick="editMember(${m.id})" style="border:none;background:none;cursor:pointer;">✏️</button>
          <button onclick="deleteMember(${m.id})" style="border:none;background:none;cursor:pointer;">🗑️</button>
        </div>
      </div>
      <div class="mc-info">
        <span class="tag gray">등록일: ${m.joinDate||'미지정'}</span>
        <span class="tag amber">${m.classType}</span>
        <span class="tag ${m.paid?'green':'red'}">${m.paid?'결제완료':'미결제'}</span>
      </div>
      <div class="mc-next-pay">🗓 다음 결제일: ${m.nextPay}</div>
      ${payBtnHtml}
    </div>`;
  }).join('');
}

function togglePay(id) {
  const idx = members.findIndex(m=>m.id===id);
  if (idx===-1) return;
  members[idx].paid = !members[idx].paid;

  // 결제 완료로 전환할 때 다음 결제일 자동 갱신 및 결제 내역 자동 기록
  if (members[idx].paid) {
    const m = members[idx];
    // 결제 내역 자동 추가
    if (!m.payHistory) m.payHistory = [];
    m.payHistory.push({
      date: todayStr,
      amount: m.fee,
      note: `${m.nextPay} 결제 처리`
    });
    // 다음 결제일 갱신
    const next = new Date(m.nextPay);
    next.setDate(next.getDate() + m.cycle);
    m.nextPay = next.toISOString().slice(0,10);
  }

  saveData(); renderMembers(); updateStats();
}

function deleteMember(id) {
  const m = members.find(m=>m.id===id);
  if (!m) return;
  if (!confirm(`${m.name} 수강생을 삭제하시겠습니까?`)) return;
  members = members.filter(m=>m.id!==id);
  renderMembers(); updateStats(); renderCalendar(); saveData();
}

function editMember(id) {
  const m = members.find(m=>m.id===id);
  if (!m) return;
  editTargetId = id;
  document.getElementById('f-name').value = m.name;
  document.getElementById('f-phone').value = m.phone;
  document.getElementById('f-fee').value = m.fee;
  document.getElementById('f-cycle').value = m.cycle;
  document.getElementById('f-nextpay').value = m.nextPay;
  document.getElementById('f-class').value = m.classType;
  document.getElementById('f-joindate').value = m.joinDate||'';
  document.getElementById('modal-add-title').textContent = '수강생 정보 수정';
  document.getElementById('modal-add').classList.add('show');
}

function openAddMember() {
  if (!editTargetId) {
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-fee').value = '150000';
    document.getElementById('f-nextpay').value = todayStr;
    document.getElementById('f-joindate').value = todayStr;
    document.getElementById('modal-add-title').textContent = '수강생 추가';
  }
  document.getElementById('modal-add').classList.add('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  editTargetId = null;
}

function saveMember() {
  const name     = document.getElementById('f-name').value;
  const phone    = document.getElementById('f-phone').value;
  const fee      = document.getElementById('f-fee').value;
  const cycle    = document.getElementById('f-cycle').value;
  const nextPay  = document.getElementById('f-nextpay').value;
  const classType= document.getElementById('f-class').value;
  const joinDate = document.getElementById('f-joindate').value;
  if (!name||!phone) { alert('이름과 번호를 입력하세요'); return; }
  if (editTargetId) {
    const idx = members.findIndex(m=>m.id===editTargetId);
    members[idx] = { ...members[idx], name, phone, fee:parseInt(fee), cycle:parseInt(cycle), nextPay, classType, joinDate };
  } else {
    members.push({ id:Date.now(), name, phone, fee:parseInt(fee), cycle:parseInt(cycle), nextPay, classType, joinDate, paid:false, attendance:[], payHistory:[] });
  }
  saveData(); renderMembers(); updateStats(); closeModal('modal-add'); editTargetId=null;
}

// ────────────────────────────────────────────────
// 결제 내역 모달
// ────────────────────────────────────────────────
function openPayHistory(memberId) {
  const m = members.find(m=>m.id===memberId);
  if (!m) return;
  currentPayHistoryMemberId = memberId;
  editingPHIdx = null;

  document.getElementById('ph-title').textContent = `💳 ${m.name} 님 결제 내역`;
  document.getElementById('ph-new-date').value = todayStr;
  document.getElementById('ph-new-amount').value = m.fee;
  document.getElementById('ph-new-note').value = '';
  document.getElementById('ph-edit-form').style.display = 'none';

  renderPayHistoryList(m);
  document.getElementById('modal-pay-history').classList.add('show');
}

function renderPayHistoryList(m) {
  if (!m) m = members.find(mb=>mb.id===currentPayHistoryMemberId);
  if (!m) return;
  if (!m.payHistory) m.payHistory = [];
  const list = [...m.payHistory].reverse(); // 최신순
  const el = document.getElementById('ph-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">결제 내역이 없습니다</div>';
    return;
  }
  el.innerHTML = list.map((ph, revIdx) => {
    const realIdx = m.payHistory.length - 1 - revIdx; // 실제 배열 인덱스
    return `
    <div class="pay-history-item" id="ph-item-${realIdx}">
      <div style="flex:1">
        <div class="ph-date">📅 ${ph.date}</div>
        <div class="ph-note">${ph.note||''}</div>
      </div>
      <div class="ph-amount">${Number(ph.amount).toLocaleString()}원</div>
      <button class="ph-edit-btn" onclick="startEditPH(${realIdx})">수정</button>
      <button class="ph-del-btn" onclick="deletePH(${realIdx})">삭제</button>
    </div>`;
  }).join('');
}

function addPayHistory() {
  const m = members.find(mb=>mb.id===currentPayHistoryMemberId);
  if (!m) return;
  const date   = document.getElementById('ph-new-date').value;
  const amount = document.getElementById('ph-new-amount').value;
  const note   = document.getElementById('ph-new-note').value;
  if (!date||!amount) { alert('결제일과 금액을 입력하세요'); return; }
  if (!m.payHistory) m.payHistory = [];
  m.payHistory.push({ date, amount:parseInt(amount), note });
  m.payHistory.sort((a,b)=>a.date.localeCompare(b.date)); // 날짜순 정렬
  saveData();
  renderPayHistoryList(m);
  document.getElementById('ph-new-note').value = '';
}

function startEditPH(idx) {
  const m = members.find(mb=>mb.id===currentPayHistoryMemberId);
  if (!m||!m.payHistory[idx]) return;
  editingPHIdx = idx;
  const ph = m.payHistory[idx];
  document.getElementById('ph-edit-date').value   = ph.date;
  document.getElementById('ph-edit-amount').value = ph.amount;
  document.getElementById('ph-edit-note').value   = ph.note||'';
  document.getElementById('ph-edit-form').style.display = 'block';
  // 수정 중인 항목 강조
  document.querySelectorAll('.pay-history-item').forEach(el=>el.classList.remove('editing'));
  const target = document.getElementById(`ph-item-${idx}`);
  if (target) target.classList.add('editing');
}

function cancelEditPH() {
  editingPHIdx = null;
  document.getElementById('ph-edit-form').style.display = 'none';
  document.querySelectorAll('.pay-history-item').forEach(el=>el.classList.remove('editing'));
}

function saveEditPH() {
  if (editingPHIdx === null) return;
  const m = members.find(mb=>mb.id===currentPayHistoryMemberId);
  if (!m) return;
  m.payHistory[editingPHIdx] = {
    date:   document.getElementById('ph-edit-date').value,
    amount: parseInt(document.getElementById('ph-edit-amount').value),
    note:   document.getElementById('ph-edit-note').value
  };
  m.payHistory.sort((a,b)=>a.date.localeCompare(b.date));
  saveData();
  cancelEditPH();
  renderPayHistoryList(m);
}

function deletePH(idx) {
  const m = members.find(mb=>mb.id===currentPayHistoryMemberId);
  if (!m||!m.payHistory[idx]) return;
  if (!confirm('이 결제 내역을 삭제할까요?')) return;
  m.payHistory.splice(idx, 1);
  saveData();
  renderPayHistoryList(m);
}

// ────────────────────────────────────────────────
// CALENDAR
// ────────────────────────────────────────────────
function switchCal(mode) {
  calMode = mode;
  const attBtn = document.getElementById('tog-att');
  const payBtn = document.getElementById('tog-pay');
  attBtn.style.background = mode==='att' ? 'var(--red)' : 'none';
  attBtn.style.color      = mode==='att' ? '#fff' : 'var(--text2)';
  payBtn.style.background = mode==='pay' ? 'var(--red)' : 'none';
  payBtn.style.color      = mode==='pay' ? '#fff' : 'var(--text2)';
  renderCalendar(); renderExtra();
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth>12) { calMonth=1; calYear++; }
  if (calMonth<1)  { calMonth=12; calYear--; }
  renderCalendar(); renderExtra();
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${MONTH_KR[calMonth-1]}`;
  const firstDay    = new Date(calYear, calMonth-1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const prevDays    = new Date(calYear, calMonth-1, 0).getDate();

  let html = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // 이전달 빈칸
  for (let i=0;i<firstDay;i++)
    html += `<div class="cal-day other-month"><div class="day-num">${prevDays-firstDay+1+i}</div></div>`;

  // 이번달
  for (let d=1;d<=daysInMonth;d++) {
    const ds      = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds===todayStr;
    let dots = '';

    if (calMode==='pay') {
      // 결제 달력: 이름 클릭 → 결제 내역 모달
      const payers = members.filter(m=>m.nextPay===ds);
      dots = payers.slice(0,3).map(m =>
        `<div class="pay-dot ${m.paid?'done':'todo'} clickable"
              onclick="event.stopPropagation(); openPayHistory(${m.id})"
              title="${m.name} 결제내역 보기">${m.name[0]} ${m.name}</div>`
      ).join('');
      if (payers.length>3)
        dots += `<div style="font-size:8px;color:var(--text2)">+${payers.length-3}명</div>`;
    } else {
      // 출석 달력: 숫자 클릭 → 명단 표시
      const dailyAttendees = members.filter(m=>(m.attendance||[]).some(a=>a.date===ds));
      if (dailyAttendees.length>0)
        dots = `<div style="color:var(--blue);font-weight:700;font-size:12px;margin-top:4px;cursor:pointer;"
                     onclick="showDailyList('${ds}')">${dailyAttendees.length}명</div>`;
    }

    html += `<div class="cal-day${isToday?' today':''}" onclick="calDayClick('${ds}')">
               <div class="day-num">${d}</div>${dots}
             </div>`;
  }

  // 다음달 빈칸
  const rem = (firstDay+daysInMonth)%7;
  if (rem>0) for (let d=1;d<=7-rem;d++)
    html += `<div class="cal-day other-month"><div class="day-num">${d}</div></div>`;

  document.getElementById('cal-grid').innerHTML = html;
}

// 달력 날짜 셀 클릭 (출석 모드에서만 명단)
function calDayClick(ds) {
  if (calMode==='att') showDailyList(ds);
}

// 날짜 클릭 → 출석 명단
function showDailyList(dateStr) {
  const extra = document.getElementById('cal-extra');
  if (!extra) return;
  const dailyAttendees = members.filter(m=>(m.attendance||[]).some(a=>a.date===dateStr));
  let html = `
    <div style="background:#fff;border-radius:14px;border:0.5px solid var(--border);padding:16px;margin-top:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px;">
        <span style="font-weight:700;font-size:15px;color:var(--text)">📅 ${dateStr} 출석 명단</span>
        <span style="background:var(--blue);color:#fff;padding:2px 8px;border-radius:10px;font-size:12px;">${dailyAttendees.length}명</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">`;
  if (dailyAttendees.length>0) {
    html += dailyAttendees.map(m=>`
      <div style="background:var(--bg);padding:10px;border-radius:10px;border:0.5px solid var(--border);display:flex;align-items:center;gap:8px;">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${m.name[0]}</div>
        <div>
          <div style="font-weight:600;font-size:13px;color:var(--text)">${m.name}</div>
          <div style="font-size:11px;color:var(--text2)">${m.classType||'일반'}</div>
        </div>
      </div>`).join('');
  } else {
    html += `<div style="grid-column:span 2;text-align:center;color:var(--text2);padding:20px;font-size:13px;">이 날짜에는 출석한 인원이 없습니다.</div>`;
  }
  html += `</div>
    <button onclick="renderExtra()" style="width:100%;margin-top:15px;padding:8px;border:none;background:var(--bg);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;">
      ← 전체 월간 통계 보기
    </button>
  </div>`;
  extra.innerHTML = html;
}

// 달력 하단 추가 정보
function renderExtra() {
  const extra = document.getElementById('cal-extra');
  if (!extra) return;
  if (calMode==='att') {
    const mo = `${calYear}-${String(calMonth).padStart(2,'0')}`;
    const rows = members.map(m=>({
      name: m.name,
      cnt: (m.attendance||[]).filter(a=>a.date.startsWith(mo)).length
    })).sort((a,b)=>b.cnt-a.cnt);
    extra.innerHTML = `
      <div style="background:#fff;border-radius:14px;border:0.5px solid var(--border);padding:16px;">
        <div class="section-head" style="margin-bottom:10px">📋 ${calYear}년 ${MONTH_KR[calMonth-1]} 출석 현황</div>
        ${rows.map(r=>`
          <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:0.5px solid var(--border);">
            <span style="color:var(--text)">${r.name}</span>
            <span style="font-weight:700;color:var(--blue)">${r.cnt}회</span>
          </div>`).join('')}
      </div>`;
  } else {
    renderUnpaid();
  }
}

// 미결제 목록
function renderUnpaid() {
  const extra = document.getElementById('cal-extra');
  if (!extra) return;
  const list = members.filter(m=>{
    if (m.paid) return false;
    const diffDays = Math.ceil((new Date(m.nextPay)-new Date(todayStr))/86400000);
    return diffDays<=7;
  }).sort((a,b)=>new Date(a.nextPay)-new Date(b.nextPay));

  const mo       = `${calYear}-${String(calMonth).padStart(2,'0')}`;
  const paidCnt  = members.filter(m=>m.paid&&m.nextPay.startsWith(mo)).length;
  const unpaidCnt= members.filter(m=>!m.paid&&m.nextPay.startsWith(mo)).length;
  const totalFee = members.filter(m=>m.nextPay.startsWith(mo)).reduce((s,m)=>s+m.fee,0);

  extra.innerHTML = `
    <div class="unpaid-card">
      <div class="section-head">⚠ 미결제 수강생 (7일 이내)</div>
      <div class="unpaid-list">
        ${list.length ? list.map(m=>{
          const dL = Math.ceil((new Date(m.nextPay)-today)/86400000);
          const lbl = dL<0?`${Math.abs(dL)}일 연체`:dL===0?'오늘':`D-${dL}`;
          return `<div class="unpaid-item">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${m.name[0]}</div>
            <div style="flex:1">
              <div class="unpaid-name">${m.name}</div>
              <div class="unpaid-due">${m.nextPay} · ${(m.fee/10000).toFixed(0)}만원</div>
            </div>
            <span style="font-size:11px;font-weight:700;color:${dL<0?'var(--red)':'var(--amber)'}">${lbl}</span>
            <button class="quick-pay-btn" onclick="quickPayAndRefresh(${m.id})">결제</button>
          </div>`;
        }).join('') : '<div class="empty-state">미결제 수강생 없음 🎉</div>'}
      </div>
    </div>
    <div style="background:#fff;border-radius:14px;border:0.5px solid var(--border);padding:16px;font-size:13px;color:var(--text2);line-height:1.9;margin-top:12px;">
      <div>결제 예정: <b style="color:var(--text)">${paidCnt+unpaidCnt}명</b></div>
      <div style="color:var(--green-dark)">✓ 완료: <b>${paidCnt}명</b></div>
      <div style="color:var(--red)">⚠ 미완료: <b>${unpaidCnt}명</b></div>
      <div style="margin-top:8px;font-weight:700;color:var(--text)">예상 수입: ${totalFee.toLocaleString()}원</div>
    </div>`;
}

function quickPayAndRefresh(id) {
  togglePay(id);
  renderCalendar();
  renderUnpaid();
}

// ────────────────────────────────────────────────
loadData();
renderMembers();
renderCalendar();
renderExtra();
updateStats();
renderAttendList();
buildLockScreen('members');
buildLockScreen('calendar');
</script>
